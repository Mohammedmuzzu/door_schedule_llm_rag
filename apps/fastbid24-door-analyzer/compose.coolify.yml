services:
  fastbid24-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FASTBID24_API_HOST: 0.0.0.0
      FASTBID24_API_PORT: 8765
      FASTBID24_MAX_UPLOAD_MB: ${FASTBID24_MAX_UPLOAD_MB:-100}
      FASTBID24_SESSION_DAYS: ${FASTBID24_SESSION_DAYS:-14}
      FASTBID24_CORS_ORIGINS: ${FASTBID24_CORS_ORIGINS}
      FASTBID24_DATABASE_NAME: ${FASTBID24_DATABASE_NAME:-fastbid24_door_analyzer}
      FASTBID24_DATABASE_URL: ${FASTBID24_DATABASE_URL}
      FASTBID24_S3_BUCKET_NAME: ${FASTBID24_S3_BUCKET_NAME}
      FASTBID24_S3_KEY_PREFIX: ${FASTBID24_S3_KEY_PREFIX:-fastbid24/door-analyzer}
      DATABASE_URL: ${DATABASE_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    ports:
      - "${FASTBID24_PUBLIC_PORT:-8765}:8765"
